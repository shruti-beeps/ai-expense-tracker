<!DOCTYPE html>
<html>
<head>
    <title>AI Expense Tracker</title>

    <style>

        body{
            font-family: Arial;
            background: #f5f7fb;
            padding: 30px;
        }

        .top{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn{
            padding: 10px 18px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .card{
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.08);
        }

        .actions a{
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .edit{
            color: blue;
        }

        .delete{
            color: red;
        }

        h1{
            color: #333;
        }

        h2{
            color: green;
        }

    </style>

</head>
<body>

<div class="top">

    <div>
        <h1>AI Expense Tracker</h1>
        <h2>Total Expense: ₹{{ total }}</h2>
    </div>

    <a class="btn" href="/add/">+ Add Expense</a>

</div>

{% for expense in expenses %}

<div class="card">

    <h3>{{ expense.title }}</h3>

    <p><b>Amount:</b> ₹{{ expense.amount }}</p>

    <p><b>Category:</b> {{ expense.category }}</p>

    <div class="actions">

        <a class="edit" href="/edit/{{ expense.id }}/">Edit</a>

        <a class="delete" href="/delete/{{ expense.id }}/">Delete</a>

    </div>

</div>

{% endfor %}

</body>
</html>
