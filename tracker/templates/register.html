<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>

        body{
            background: #f2f2f2;
            font-family: Arial;
        }

        .container{
            width: 350px;
            background: white;
            margin: 80px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #45a049;
        }

        p{
            text-align: center;
        }

        a{
            text-decoration: none;
            color: blue;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Register</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Register</button>

    </form>

    <p>
        Already have an account?
        <a href="/login/">Login</a>
    </p>

</div>

</body>
</html>
